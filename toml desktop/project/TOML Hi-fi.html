<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>TOML — Hi-fi v1</title>
<meta name="viewport" content="width=1440" />
<link rel="stylesheet" href="hifi/styles.css" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  .toml { width: 100%; height: 100%; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="hifi/primitives.jsx"></script>
<script type="text/babel" src="hifi/screens-landing.jsx"></script>
<script type="text/babel" src="hifi/screens-app.jsx"></script>
<script type="text/babel">

const Wrap = ({ w = 1280, h = 800, children }) => (
  <div className="toml" style={{ width: w, height: h, background: 'var(--paper)' }}>
    {children}
  </div>
);

function App() {
  return (
    <DesignCanvas>
      <DCSection id="hifi-system" title="Direction visuelle" subtitle="Sézane-like · blanc cassé + bordeaux + camel · Fraunces + Inter">
        <DCArtboard id="ds-palette" label="Design system — palette & typo" width={900} height={540}>
          <div className="toml" style={{ width: 900, height: 540, padding: 36, background: 'var(--paper)' }}>
            <div className="tlabel" style={{ marginBottom: 8 }}>TOML · Hi-fi v1</div>
            <h2 className="toml-serif" style={{ fontSize: 36, fontWeight: 400, margin: 0, marginBottom: 24 }}>
              Direction visuelle <span style={{ fontStyle: 'italic' }}>chaleureuse</span>
            </h2>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(6, 1fr)', gap: 12, marginBottom: 28 }}>
              {[
                ['Paper', '#faf6f0'],
                ['Ink', '#1f1812'],
                ['Bordeaux', '#6b1f2a'],
                ['Camel', '#b88a5e'],
                ['Sage', '#6e7a5e'],
                ['Rose', '#e9a89a'],
              ].map(([n, c]) => (
                <div key={n}>
                  <div style={{ width: '100%', height: 70, background: c, borderRadius: 10, border: '1px solid var(--line)', marginBottom: 6 }}></div>
                  <div style={{ fontSize: 12, fontWeight: 600 }}>{n}</div>
                  <div style={{ fontSize: 11, color: 'var(--ink-3)', fontFamily: 'var(--font-sans)' }}>{c}</div>
                </div>
              ))}
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24 }}>
              <div>
                <div className="tlabel" style={{ marginBottom: 8 }}>Fraunces — titres</div>
                <div className="toml-serif" style={{ fontSize: 38, lineHeight: 1, marginBottom: 4 }}>Mes <span style={{ fontStyle: 'italic' }}>envies</span></div>
                <div style={{ fontSize: 13, color: 'var(--ink-3)' }}>Serif chaleureux, italique pour la touche perso</div>
              </div>
              <div>
                <div className="tlabel" style={{ marginBottom: 8 }}>Inter — UI & corps</div>
                <div style={{ fontSize: 16, marginBottom: 4, fontWeight: 500 }}>Une seule liste, tous tes sites préférés.</div>
                <div style={{ fontSize: 13, color: 'var(--ink-3)' }}>Sans propre, lisible à toutes tailles</div>
              </div>
            </div>
            <div style={{ marginTop: 24, display: 'flex', gap: 10, flexWrap: 'wrap', alignItems: 'center' }}>
              <button className="tbtn tbtn-primary">Action principale</button>
              <button className="tbtn tbtn-secondary">Secondaire</button>
              <button className="tbtn tbtn-outline">Outline</button>
              <button className="tbtn tbtn-ghost">Ghost</button>
              <span className="tchip tchip-active">Active</span>
              <span className="tchip">Filter</span>
              <span className="tchip tchip-burg">Réservé</span>
              <span className="tsticker">Coup de cœur ★★★</span>
              <span className="toml-hand" style={{ color: 'var(--burgundy)', fontSize: 18 }}>« note manuscrite »</span>
            </div>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="hifi-landing" title="1 · Landing — version B (split + cards)">
        <DCArtboard id="land-b" label="Landing B · Hi-fi" width={1280} height={800}>
          <Wrap><HiLanding /></Wrap>
        </DCArtboard>
      </DCSection>

      <DCSection id="hifi-dashboard" title="4 · Dashboard — version A (topbar)">
        <DCArtboard id="dash-a" label="Dashboard A · Hi-fi" width={1280} height={800}>
          <Wrap><HiDashboard /></Wrap>
        </DCArtboard>
      </DCSection>

      <DCSection id="hifi-wlmasonry" title="5 · Wishlist propriétaire — masonry">
        <DCArtboard id="wl-mas" label="Wishlist masonry · Hi-fi" width={1280} height={900}>
          <Wrap h={900}><HiWishlistOwner /></Wrap>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
